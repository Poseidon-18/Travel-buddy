<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Buddy</title>
    <style>
        :root {
            --primary: #0A192F;      /* Deep Navy Background */
            --accent: #64FFDA;       /* Vibrant Teal Accent */
            --bg: #0A192F;           /* Deep Navy */
            --card: #112240;         /* Slightly Lighter Navy */
            --surface: #1E2A3A;      /* Elevated Surface */
            --text-primary: #E6F1FF; /* Off-White */
            --text-secondary: #8892B0; /* Muted Gray-Blue */
            --border: #233554;       /* Subtle Border */
            --danger: #FF6B6B;       /* Soft Red for delete */
            --success: #64FFDA;      /* Teal for success */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0A192F 0%, #0F1A2E 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(100, 255, 218, 0.1);
            width: 100%;
            max-width: 600px;
            backdrop-filter: blur(0px);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 { 
            text-align: center; 
            color: var(--text-primary);
            margin-bottom: 1.8rem;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #E6F1FF 0%, #64FFDA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .form-group { 
            margin-bottom: 0.8rem; 
        }
        .full-width { 
            grid-column: span 2; 
        }

        label { 
            display: block; 
            margin-bottom: 0.6rem; 
            font-weight: 600; 
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 0.9rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 0.95rem;
            color: var(--text-primary);
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(100, 255, 218, 0.1);
        }

        input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent) 0%, #4CD4B0 100%);
            color: #0A192F;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(100, 255, 218, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        #outputCard {
            margin-top: 24px;
            padding: 1.5rem;
            background: var(--surface);
            border-left: 4px solid var(--accent);
            border-radius: 12px;
            display: none;
            animation: slideDown 0.4s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .quote-text { 
            line-height: 1.7; 
            color: var(--text-primary);
            margin: 0;
            font-size: 0.95rem;
        }
        
        .label-tag { 
            font-weight: 700; 
            color: var(--accent);
            background: rgba(100, 255, 218, 0.1);
            padding: 2px 6px;
            border-radius: 6px;
            display: inline-block;
        }

        /* Saved Trips Section */
        #tripsSection {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        #tripsSection h3 {
            color: var(--text-primary);
            margin-bottom: 20px;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #tripsSection h3::before {
            content: "📋";
            font-size: 1.3rem;
        }

        .trip-card {
            background: var(--surface);
            padding: 1.2rem;
            border-radius: 16px;
            margin-bottom: 12px;
            border-left: 4px solid var(--accent);
            transition: all 0.3s ease;
            animation: fadeIn 0.3s ease-out;
        }

        .trip-card:hover {
            transform: translateX(5px);
            background: #1E3448;
        }

        .trip-card p {
            margin: 8px 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .trip-card p strong {
            color: var(--text-primary);
            font-size: 1rem;
        }

        .trip-card .trip-route {
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: var(--accent);
        }

        .delete-btn {
            background: rgba(255, 107, 107, 0.2);
            color: #FF8A8A;
            padding: 8px 16px;
            font-size: 0.85rem;
            width: auto;
            margin-top: 12px;
            text-transform: none;
            letter-spacing: normal;
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.2) 0%, rgba(255, 107, 107, 0.1) 100%);
        }

        .delete-btn:hover {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.3) 0%, rgba(255, 107, 107, 0.2) 100%);
            transform: translateY(-1px);
            box-shadow: 0 5px 15px -3px rgba(255, 107, 107, 0.2);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            background: var(--surface);
            border-radius: 16px;
            font-style: italic;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--card);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4CD4B0;
        }

        /* Date input styling */
        input[type="date"] {
            color-scheme: dark;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.8);
            cursor: pointer;
        }

        /* Select dropdown styling */
        select option {
            background: var(--surface);
            color: var(--text-primary);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>✨ Travel Buddy</h2>
    
    <div class="grid">
        <div class="form-group">
            <label>📍 From</label>
            <input type="text" id="startLocation" placeholder="Origin city...">
        </div>

        <div class="form-group">
            <label>🎯 To</label>
            <input type="text" id="destination" placeholder="Destination...">
        </div>

        <div class="form-group">
            <label>📅 Date</label>
            <input type="date" id="travelDate">
        </div>

        <div class="form-group">
            <label>⏰ Time Slot</label>
            <select id="travelTime">
            </select>
        </div>

        <div class="form-group">
            <label>👥 Total People</label>
            <input type="number" id="peopleCount" min="1" value="1">
        </div>

        <div class="form-group">
            <label>💰 Amount</label>
            <input type="text" id="amount" placeholder="e.g., ₹500-800">
        </div>

        <div class="form-group">
            <label>⚥ Gender</label>
            <select id="gender">
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
        </div>

        <div class="form-group full-width">
            <label>📞 How to contact you?</label>
            <input type="text" id="Method" placeholder="Phone / Instagram / Email...">
        </div>
    </div>

    <button onclick="generateplan()">✨ Generate Preview</button>
    <button onclick="saveTrip()" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white;">💾 Save Trip</button>

    <div id="outputCard">
        <p class="quote-text" id="quoteResult"></p>
    </div>
</div>

<script>
    // Populate the time dropdown with 30-minute intervals
    const timeSelect = document.getElementById('travelTime');
    for (let h = 0; h < 24; h++) {
        for (let m = 0; m < 60; m += 30) {
            let hour = h % 12 || 12;
            let ampm = h < 12 ? 'AM' : 'PM';
            let minute = m === 0 ? '00' : m;
            let timeStr = `${hour}:${minute} ${ampm}`;
            let option = new Option(timeStr, timeStr);
            timeSelect.add(option);
        }
    }

    // Set today's date as default
    document.getElementById('travelDate').valueAsDate = new Date();

    // Load trips when page loads
    document.addEventListener('DOMContentLoaded', loadAllTrips);

    // Function to load all trips from server
    async function loadAllTrips() {
        try {
            const response = await fetch('/api/trips');
            const trips = await response.json();
            displayTrips(trips);
        } catch (error) {
            console.error('Error loading trips:', error);
        }
    }

    // Function to save a new trip
    async function saveTrip() {
        const tripData = {
            from: document.getElementById('startLocation').value,
            to: document.getElementById('destination').value,
            date: document.getElementById('travelDate').value,
            time: document.getElementById('travelTime').value,
            people: document.getElementById('peopleCount').value,
            amount: document.getElementById('amount').value,
            gender: document.getElementById('gender').value,
            contact: document.getElementById('Method').value
        };

        // Validate
        if (!tripData.from || !tripData.to || !tripData.date || !tripData.amount || !tripData.contact) {
            alert("❌ Please fill in all details");
            return;
        }

        try {
            const response = await fetch('/api/trips', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(tripData)
            });
            
            const result = await response.json();
            alert('✅ Trip saved successfully!');
            loadAllTrips(); // Refresh the list
            clearForm();
            document.getElementById('outputCard').style.display = 'none';
        } catch (error) {
            console.error('Error saving trip:', error);
            alert('❌ Error saving trip. Please try again.');
        }
    }

    // Function to delete a trip
    async function deleteTrip(id) {
        if (!confirm('🗑️ Are you sure you want to delete this trip?')) return;
        
        try {
            await fetch(`/api/trips/${id}`, {
                method: 'DELETE'
            });
            loadAllTrips(); // Refresh the list
        } catch (error) {
            console.error('Error deleting trip:', error);
        }
    }

    // Function to display trips
    function displayTrips(trips) {
        // Create trips display section if it doesn't exist
        let tripsSection = document.getElementById('tripsSection');
        
        if (!tripsSection) {
            // Create the trips section
            const container = document.querySelector('.container');
            const newSection = document.createElement('div');
            newSection.id = 'tripsSection';
            newSection.innerHTML = `
                <h3>Saved Trips</h3>
                <div id="tripsList"></div>
            `;
            container.appendChild(newSection);
            tripsSection = newSection;
        }

        const tripsList = document.getElementById('tripsList');
        
        if (trips.length === 0) {
            tripsList.innerHTML = '<div class="empty-state">✨ No trips saved yet. Create your first trip!</div>';
            return;
        }

        let html = '';
        trips.forEach(trip => {
            html += `
                <div class="trip-card">
                    <p class="trip-route"><strong>${escapeHtml(trip.from)}</strong> → <strong>${escapeHtml(trip.to)}</strong></p>
                    <p>📅 ${formatDate(trip.date)} at ${escapeHtml(trip.time)}</p>
                    <p>👥 ${trip.people} ${trip.people > 1 ? 'people' : 'person'} | 💰 ${escapeHtml(trip.amount)}</p>
                    <p>⚥ ${escapeHtml(trip.gender)} | 📞 ${escapeHtml(trip.contact)}</p>
                    <button onclick="deleteTrip('${trip.id}')" class="delete-btn">🗑️ Delete Trip</button>
                </div>
            `;
        });

        tripsList.innerHTML = html;
    }

    // Helper function to escape HTML
    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // Helper function to format date
    function formatDate(dateString) {
        const options = { year: 'numeric', month: 'short', day: 'numeric' };
        return new Date(dateString).toLocaleDateString(undefined, options);
    }

    // Function to clear form
    function clearForm() {
        document.getElementById('startLocation').value = '';
        document.getElementById('destination').value = '';
        document.getElementById('travelDate').valueAsDate = new Date();
        document.getElementById('peopleCount').value = '1';
        document.getElementById('amount').value = '';
        document.getElementById('Method').value = '';
        document.getElementById('gender').value = 'male';
    }

    // Keep your existing generateplan function for preview
    function generateplan() {
        const from = document.getElementById('startLocation').value;
        const to = document.getElementById('destination').value;
        const date = document.getElementById('travelDate').value;
        const time = document.getElementById('travelTime').value;
        const people = document.getElementById('peopleCount').value;
        const amount = document.getElementById('amount').value;
        const gender = document.getElementById('gender').value;
        const contact = document.getElementById('Method').value;

        if (!from || !to || !date || !amount || !contact) {
            alert("❌ Please fill in all details");
            return;
        }

        const personText = people > 1 ? "people" : "person";

        const quote = `✨ This is to confirm a trip for <span class="label-tag">${people} ${personText}</span> traveling from <span class="label-tag">${escapeHtml(from)}</span> to <span class="label-tag">${escapeHtml(to)}</span>. The journey is scheduled for <span class="label-tag">${formatDate(date)}</span> during the <span class="label-tag">${escapeHtml(time)}</span> window. Total amount: <span class="label-tag">${escapeHtml(amount)}</span>. Contact via: <span class="label-tag">${escapeHtml(contact)}</span>`;
        
        document.getElementById('quoteResult').innerHTML = quote;
        document.getElementById('outputCard').style.display = 'block';
        
        // Scroll to output card
        document.getElementById('outputCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
</script>
</body>
</html>
